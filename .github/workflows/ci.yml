name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --group dev

      - name: Ruff
        run: uv run ruff check app jobs ml tests

      - name: Mypy
        run: uv run mypy

      - name: Pytest
        run: uv run pytest

      - name: Syntax smoke
        run: uv run python -m compileall app jobs ml scripts airflow/dags
